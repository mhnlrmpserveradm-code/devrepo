<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Hub</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Fashion Hub</h1>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Men</a></li>
            <li><a href="#">Women</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <h2>New Fashion Collection 2026</h2>
    <p>Trendy clothes for every season</p>
    <button>Shop Now</button>
</section>

<section class="products">

    <h2>Our Products</h2>

    <div class="product-container">

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="T-Shirt">
            <h3>Men T-Shirt</h3>
            <p>₹799</p>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Dress">
            <h3>Women Dress</h3>
            <p>₹1299</p>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Jacket">
            <h3>Winter Jacket</h3>
            <p>₹1999</p>
        </div>

    </div>

</section>

<footer>
    <p>© 2026 Fashion Hub | All Rights Reserved</p>
</footer>

</body>
</html>
